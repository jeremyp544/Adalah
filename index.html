<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>maaf sayangg ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #fce4ec, #f8bbd0, #e1bee7, #d1c4e9);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== HALAMAN ===== */
        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.6s ease, transform 0.6s ease;
            z-index: 10;
        }

        .page-hidden {
            opacity: 0;
            transform: scale(0.9) rotate(-4deg);
            pointer-events: none;
            z-index: 1;
        }

        .page-visible {
            opacity: 1;
            transform: scale(1) rotate(0deg);
            pointer-events: auto;
            z-index: 20;
        }

        /* ===== HALAMAN 1 ===== */
        #page1 .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 50px 36px 48px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(233, 30, 99, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.6);
            animation: cardPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #page1 .emoji {
            font-size: 5rem;
            display: block;
            margin-bottom: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1) rotate(-2deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }

        #page1 h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: #ad1457;
            margin: 4px 0 18px;
            text-shadow: 0 4px 20px rgba(233, 30, 99, 0.15);
        }

        #page1 .sub {
            font-size: 1.1rem;
            color: #6a1b3a;
            background: rgba(255, 255, 255, 0.5);
            padding: 8px 24px;
            border-radius: 60px;
            display: inline-block;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Tombol di Halaman 1 */
        .btn-group-page1 {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            min-height: 100px;
        }

        .btn-p1 {
            padding: 18px 44px;
            border: none;
            border-radius: 80px;
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            min-width: 130px;
            position: relative;
        }

        .btn-yes-p1 {
            background: linear-gradient(135deg, #e91e63, #d81b60);
            color: #fff;
            box-shadow: 0 8px 28px rgba(233, 30, 99, 0.4);
        }

        .btn-yes-p1:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 14px 40px rgba(233, 30, 99, 0.5);
        }

        .btn-yes-p1:active {
            transform: scale(0.94);
        }

        .btn-no-p1 {
            background: rgba(200, 200, 200, 0.3);
            color: #555;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(150, 150, 150, 0.2);
            transform: scale(1);
            transition: transform 0.15s ease, opacity 0.15s ease;
            min-width: 130px;
        }

        .btn-no-p1:active {
            transform: scale(0.95);
        }

        /* ===== HALAMAN 2 ===== */
        #page2 .card {
            max-width: 560px;
            width: 100%;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 36px 28px 44px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(233, 30, 99, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.6);
            max-height: 90vh;
            overflow-y: auto;
        }

        #page2 .emoji-big {
            font-size: 3.8rem;
            display: block;
            animation: pulse 2s infinite;
        }

        #page2 h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.6rem;
            color: #ad1457;
            margin: 2px 0 4px;
        }

        #page2 .sub-message {
            font-size: 1rem;
            font-weight: 600;
            color: #6a1b3a;
            background: rgba(255, 255, 255, 0.5);
            padding: 6px 20px;
            border-radius: 60px;
            display: inline-block;
            margin: 6px auto 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .message-box {
            background: rgba(255, 235, 240, 0.4);
            border-radius: 28px;
            padding: 22px 20px;
            margin: 14px 0 22px;
            border-left: 6px solid #e91e63;
            text-align: left;
            min-height: 160px;
        }

        .message-box #typewriter {
            font-size: 1.05rem;
            line-height: 1.9;
            color: #3a1422;
            font-weight: 500;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 150px;
        }

        .message-box #typewriter .cursor {
            display: inline-block;
            width: 3px;
            height: 1.1rem;
            background: #e91e63;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Love Meter */
        .love-meter {
            margin: 8px 0 14px;
            background: rgba(200, 200, 200, 0.3);
            height: 12px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .love-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f48fb1, #e91e63, #ad1457);
            border-radius: 30px;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px #e91e63;
        }

        .love-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #6a1b3a;
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .response-area {
            margin-top: 18px;
            padding: 12px 10px;
            min-height: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ad1457;
            font-family: 'Dancing Script', cursive;
        }

        .response-area .sub {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: #6a1b3a;
            margin-top: 4px;
        }

        /* Confetti Container */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            border-radius: 4px;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.3); opacity: 1; }
            100% { transform: translateY(110vh) rotate(1080deg) scale(1.5); opacity: 0; }
        }

        .confetti-heart {
            position: absolute;
            animation: heartExplode linear forwards;
        }

        @keyframes heartExplode {
            0% { transform: translate(0, 0) scale(0.2) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(2) rotate(720deg); opacity: 0; }
        }

        /* Floating hearts bg */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            font-size: 1.8rem;
            animation: floatHeart linear infinite;
            opacity: 0.4;
            user-select: none;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1.2); opacity: 0; }
        }

        @media (max-width: 480px) {
            #page1 .card { padding: 36px 20px 32px; }
            #page1 h1 { font-size: 2.2rem; }
            #page1 .emoji { font-size: 3.8rem; }
            .btn-p1 { padding: 14px 28px; font-size: 1.1rem; min-width: 100px; }
            .btn-group-page1 { gap: 16px; }

            #page2 .card { padding: 24px 16px 32px; }
            #page2 h1 { font-size: 2rem; }
            .message-box #typewriter { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- Floating Hearts Background -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- ===== HALAMAN 1 ===== -->
    <div class="page page-visible" id="page1">
        <div class="card">
            <span class="emoji">🥺</span>
            <h1>Maaf, sayang?</h1>
            <span class="sub">❤️ Tolong jawab dengan jujur ya ❤️</span>

            <div class="btn-group-page1">
                <button class="btn-p1 btn-yes-p1" id="btnYesP1">💖 Ya</button>
                <button class="btn-p1 btn-no-p1" id="btnNoP1">😤 Tidak</button>
            </div>

            <div style="margin-top:24px; font-size:0.9rem; color:#888;" id="noCounter">
                Tekan "Tidak" dan lihat apa yang terjadi 😉
            </div>
        </div>
    </div>

    <!-- ===== HALAMAN 2 ===== -->
    <div class="page page-hidden" id="page2">
        <div class="card">
            <span class="emoji-big">❤️</span>
            <h1>A letter for uu</h1>
            <span class="sub-message">🌹 Dear sayangku givingg 🌹</span>

            <div class="message-box">
                <div id="typewriter"></div>
            </div>

            <div class="love-meter">
                <div class="love-fill" id="loveFill"></div>
            </div>
            <div class="love-label">
                <span>💔 Sedih</span>
                <span id="loveText">0%</span>
                <span>❤️‍🔥 Sayang</span>
            </div>

            <div class="response-area" id="responseArea">
                <span>✨ Terima kasih so kasih maaf ✨</span>
                <div class="sub">kt janji bakal lebih baik lagi for sayang ❤️</div>
            </div>
        </div>
    </div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // ==========================================
        // BACKGROUND FLOATING HEARTS
        // ==========================================
        (function createHeartsBg() {
            const bg = document.getElementById('heartsBg');
            const symbols = ['❤️', '💖', '✨', '🌸', '💕', '🌺', '🩷'];
            for (let i = 0; i < 22; i++) {
                const el = document.createElement('div');
                el.className = 'heart-float';
                el.textContent = symbols[i % symbols.length];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (1.2 + Math.random() * 2.6) + 'rem';
                el.style.animationDuration = (14 + Math.random() * 24) + 's';
                el.style.animationDelay = (Math.random() * 20) + 's';
                el.style.opacity = 0.25 + Math.random() * 0.35;
                bg.appendChild(el);
            }
        })();

        // ==========================================
        // HALAMAN 1: TOMBOL "TIDAK" MENGEcil
        // ==========================================
        const btnNo = document.getElementById('btnNoP1');
        const btnYes = document.getElementById('btnYesP1');
        const noCounter = document.getElementById('noCounter');
        let scaleNo = 1;
        let clickCount = 0;

        btnNo.addEventListener('click', function(e) {
            e.preventDefault();
            clickCount++;
            // Kurangi skala 15% setiap klik, tapi minimal 0.05
            scaleNo = Math.max(0.05, scaleNo * 0.85);
            btnNo.style.transform = `scale(${scaleNo})`;
            btnNo.style.opacity = Math.max(0.1, scaleNo);

            if (clickCount === 1) {
                noCounter.innerText = '🤨 Masih bandel?';
            } else if (clickCount === 2) {
                noCounter.innerText = '😅 Ayo dong, jangan gitu...';
            } else if (clickCount === 3) {
                noCounter.innerText = '🥺 Udah deh, maafin aku...';
            } else if (clickCount === 4) {
                noCounter.innerText = '😭 Aku nangis nih!';
            } else if (clickCount >= 5) {
                noCounter.innerText = '💔 Ya udah...';
            }

            // Kalau udah terlalu kecil, tombol gak bakal bisa diklik karena opacity 0
            if (scaleNo <= 0.08) {
                btnNo.style.pointerEvents = 'none';
                noCounter.innerText = '😭 Iya deh, kt ngalah... maafin kt ya sayang 💔';
            }
        });

        // ==========================================
        // HALAMAN 1: TOMBOL "YA" -> Pindah ke Halaman 2
        // ==========================================
        btnYes.addEventListener('click', function() {
            // Pindah halaman
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');

            page1.classList.remove('page-visible');
            page1.classList.add('page-hidden');
            page2.classList.remove('page-hidden');
            page2.classList.add('page-visible');

            // Mulai typewriter & love meter
            startTypewriter();
            // Kasih love meter awal 30%
            setTimeout(() => {
                updateLoveMeter(30);
            }, 400);

            // Trigger confetti kecil
            triggerConfetti(30);
        });

        // ==========================================
        // HALAMAN 2: TYPEWRITER
        // ==========================================
        const fullText =
            `Maaf sayang, akhir-akhir ini so sering marah,\ndengan buat sayang so saki hati.\nBukan cuma satu kali tapi so banyak kali 😢\n\nJadi kt minta maaf sekalii,\nkedepannya snda akan terjadi lagii,\nkt bakal introspeksi diri.\n\nJadi minta maaf yaah sayang,\ni love uuu forever ❤️❤️🤍🤍❤️🤍`;

        let charIndex = 0;
        const typewriterEl = document.getElementById('typewriter');
        let isTypewriting = false;

        function startTypewriter() {
            if (isTypewriting) return;
            isTypewriting = true;
            typewriterEl.innerHTML = '';
            charIndex = 0;
            typeWriterStep();
        }

        function typeWriterStep() {
            if (charIndex < fullText.length) {
                let currentText = fullText.substring(0, charIndex + 1);
                let htmlText = currentText.replace(/\n/g, '<br>');
                typewriterEl.innerHTML = htmlText + '<span class="cursor"></span>';
                charIndex++;
                setTimeout(typeWriterStep, 25 + Math.random() * 18);
            } else {
                typewriterEl.innerHTML = fullText.replace(/\n/g, '<br>');
                // Setelah selesai, love meter ke 100%
                setTimeout(() => {
                    updateLoveMeter(70);
                    // Trigger confetti lagi
                    setTimeout(() => triggerConfetti(50), 300);
                }, 600);
            }
        }

        // ==========================================
        // LOVE METER
        // ==========================================
        let loveLevel = 0;
        const loveFill = document.getElementById('loveFill');
        const loveText = document.getElementById('loveText');

        function updateLoveMeter(value) {
            loveLevel = Math.min(100, loveLevel + value);
            loveFill.style.width = loveLevel + '%';
            loveText.innerText = loveLevel + '%';
            if (loveLevel >= 100) {
                loveText.innerText = '💯 Sempurna!';
                // Trigger confetti besar
                setTimeout(() => triggerConfetti(80), 300);
            }
        }

        // ==========================================
        // CONFETTI
        // ==========================================
        function triggerConfetti(count = 40) {
            const container = document.getElementById('confettiContainer');
            const colors = ['#e91e63', '#ff4081', '#f48fb1', '#ad1457', '#ff80ab', '#ffcdd2', '#ffb74d', '#4dd0e1', '#81c784',
                '#ce93d8'
            ];

            // Confetti pieces
            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.top = '-10%';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                const size = 6 + Math.random() * 14;
                piece.style.width = size + 'px';
                piece.style.height = size + 'px';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDuration = (2 + Math.random() * 3.5) + 's';
                piece.style.animationDelay = (Math.random() * 1.5) + 's';
                container.appendChild(piece);
            }

            // Hati & bintang
            const symbols = ['❤️', '💖', '💗', '❤️‍🔥', '✨', '💕', '🌸', '🩷', '🌟', '💘'];
            for (let i = 0; i < Math.floor(count * 0.6); i++) {
                const el = document.createElement('div');
                el.className = 'confetti-heart';
                el.textContent = symbols[i % symbols.length];
                el.style.left = (10 + Math.random() * 80) + '%';
                el.style.top = (10 + Math.random() * 50) + '%';
                el.style.setProperty('--tx', (Math.random() * 500 - 250) + 'px');
                el.style.setProperty('--ty', (Math.random() * -500 - 200) + 'px');
                el.style.fontSize = (1.6 + Math.random() * 2.8) + 'rem';
                el.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
                el.style.animationDelay = (Math.random() * 1.2) + 's';
                container.appendChild(el);
            }

            setTimeout(() => {
                container.innerHTML = '';
            }, 6000);
        }
    </script>

</body>
</html>
